name: Admin Task

on:
  workflow_dispatch:
    inputs:
      script:
        description: "Script to run (relative to services repo)"
        required: true
        default: "scripts/backfill-meilisearch.ts"
        type: choice
        options:
          - scripts/backfill-meilisearch.ts
          - scripts/backfill-embeddings.ts
          - scripts/seed-chefs-depot-membership.ts
          - scripts/auto-schedule-draws.ts
      timeout:
        description: "Timeout in seconds"
        required: false
        default: "600"
        type: string

env:
  EC2_INSTANCE: i-07fb3cc6aeea2eb49
  AWS_REGION: ap-southeast-2
  DOCKER_NETWORK: app-network
  IMAGE: ghcr.io/${{ github.repository_owner }}/keenan-admin-task:latest

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Checkout @keenan/services
        uses: actions/checkout@v4
        with:
          repository: cmlibra71/keenan-group-services
          token: ${{ secrets.GH_PAT }}
          path: _services

      - name: Pack services repo for Docker context
        run: |
          cd _services
          tar czf ../keenan-services-admin.tar.gz .

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push admin image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.admin
          push: true
          tags: ${{ env.IMAGE }}
          build-args: |
            SCRIPT=${{ inputs.script }}

  run:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Run admin task via SSM
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids ${{ env.EC2_INSTANCE }} \
            --document-name "AWS-RunShellScript" \
            --timeout-seconds ${{ inputs.timeout }} \
            --parameters "commands=[
              \"echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin\",
              \"docker pull ${{ env.IMAGE }}\",
              \"docker run --rm --network ${{ env.DOCKER_NETWORK }} -e COMMERCE_DATABASE_URL=${{ secrets.COMMERCE_DATABASE_URL }} -e MEILI_URL=http://keenan-search:7700 -e MEILI_API_KEY=${{ secrets.MEILI_MASTER_KEY }} -e GOOGLE_API_KEY=${{ secrets.GOOGLE_API_KEY }} ${{ env.IMAGE }}\",
              \"docker image rm ${{ env.IMAGE }} || true\"
            ]" \
            --output json \
            --query 'Command.CommandId' \
            --output text)

          echo "SSM Command ID: $COMMAND_ID"
          echo "command_id=$COMMAND_ID" >> $GITHUB_ENV

      - name: Wait for completion
        run: |
          echo "Waiting for admin task to complete..."
          for i in $(seq 1 60); do
            sleep 10
            STATUS=$(aws ssm get-command-invocation \
              --command-id ${{ env.command_id }} \
              --instance-id ${{ env.EC2_INSTANCE }} \
              --query 'Status' --output text 2>/dev/null || echo "Pending")

            if [ "$STATUS" = "Success" ]; then
              echo "Task completed successfully!"
              aws ssm get-command-invocation \
                --command-id ${{ env.command_id }} \
                --instance-id ${{ env.EC2_INSTANCE }} \
                --query 'StandardOutputContent' --output text
              exit 0
            elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "TimedOut" ] || [ "$STATUS" = "Cancelled" ]; then
              echo "Task failed with status: $STATUS"
              aws ssm get-command-invocation \
                --command-id ${{ env.command_id }} \
                --instance-id ${{ env.EC2_INSTANCE }} \
                --query '{Output: StandardOutputContent, Error: StandardErrorContent}' --output json
              exit 1
            fi

            echo "Status: $STATUS (attempt $i/60)"
          done

          echo "Timed out waiting for task"
          exit 1
